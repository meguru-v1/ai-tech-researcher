name: Research Pipeline

on:
  schedule:
    - cron: '0 21 * * *'     # 毎日 06:00 JST (daily pipeline)
    - cron: '30 21 * * 0'    # 毎週日曜 06:30 JST (週次レポート)
    - cron: '0 22 1 * *'     # 毎月1日 07:00 JST (月次レポート + 再分類)
    - cron: '0 20 * * 0'     # 毎週日曜 05:00 JST (週次バックアップ)
  workflow_dispatch:
    inputs:
      report_type:
        description: '実行するレポート種別'
        required: false
        default: 'daily'
        type: choice
        options: [daily, weekly, monthly, recategorize, backup]

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        run: cd v2 && npm install

      - name: Run Daily Pipeline
        if: github.event.schedule == '0 21 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'daily')
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: cd v2 && npx tsx daily_pipeline.ts

      - name: Generate Weekly Report
        if: github.event.schedule == '30 21 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'weekly')
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
        run: |
          curl -X POST "${VERCEL_URL}/api/report/weekly" -H "Content-Type: application/json"

      - name: Generate Monthly Report + Recategorize
        if: github.event.schedule == '0 22 1 * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'monthly')
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
        run: |
          curl -X POST "${VERCEL_URL}/api/report/monthly" -H "Content-Type: application/json"
          echo "月次レポート生成完了、再分類を実行..."
          curl -X POST "${VERCEL_URL}/api/recategorize" -H "Content-Type: application/json"

      - name: Recategorize Only
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'recategorize'
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
        run: |
          curl -X POST "${VERCEL_URL}/api/recategorize" -H "Content-Type: application/json"

      - name: Weekly DB Backup
        if: github.event.schedule == '0 20 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'backup')
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: cd v2 && npx tsx scripts/backup.ts

      - name: Commit DB Backup
        if: github.event.schedule == '0 20 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'backup')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v2/backups/ || true
          git diff --staged --quiet || git commit -m "chore: weekly DB backup $(date +%Y-%m-%d)"
          git push origin main || true
