name: Research Pipeline

on:
  schedule:
    - cron: '0 21 * * *'     # 毎日 06:00 JST (daily pipeline, full mode)
    - cron: '0 3 * * *'      # 毎日 12:00 JST (collect-only)
    - cron: '0 9 * * *'      # 毎日 18:00 JST (collect-only)
    - cron: '0 20 * * 0'     # 毎週日曜 05:00 JST (週次バックアップ)
    # ※ 週次/月次レポートは daily pipeline(full) が日曜/月初に判定して生成・メール送信する。
    #    旧: 週次/月次/再分類を /api/report/* に curl する cron があったが、これらのエンドポイントは
    #    isOwner() 必須でcron認証バイパスが無く、無認証curlは403で空振り（死んだcron）だったため削除した。
  workflow_dispatch:
    inputs:
      report_type:
        description: '実行するレポート種別'
        required: false
        default: 'daily'
        type: choice
        options: [daily, collect, backup]

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        run: cd v2 && npm install

      # 日次フルパイプライン: 収集・ベクトル化・知識抽出・自律リサーチ・evolve に加え、
      # 日次レポートの生成＋メール送信も行う（外部cronは未設定のためパイプラインで生成する）。
      # ※ GitHub Actions cron は数時間遅延するため、生成は06:00ちょうどでなく朝7〜8時JST頃になる。
      #   定刻にしたい場合は /api/report を外部cron(CRON_SECRET)で叩く構成へ移行する。
      - name: Run Daily Pipeline (full)
        if: github.event.schedule == '0 21 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'daily')
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          # 日次レポートの生成＋DB保存＋メール送信はこのパイプラインが行う。
          # （以前は外部cron→/api/report に委ねてSKIPしていたが、その外部cronは存在せず＝レポートが生成されない不具合だった）
          # 6:00ちょうどに送りたくなったら /api/report を外部cron(CRON_SECRET)で駆動する構成に移行する。
        run: cd v2 && npx tsx daily_pipeline.ts

      - name: Run Collection (midday/evening)
        if: github.event.schedule == '0 3 * * *' || github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'collect')
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          PIPELINE_MODE: collect
        run: cd v2 && npx tsx daily_pipeline.ts

      - name: Weekly DB Backup
        if: github.event.schedule == '0 20 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'backup')
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: cd v2 && npx tsx scripts/backup.ts

      - name: Commit DB Backup
        if: github.event.schedule == '0 20 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.report_type == 'backup')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add v2/backups/ || true
          git diff --staged --quiet || git commit -m "chore: weekly DB backup $(date +%Y-%m-%d)"
          git push origin main || true
