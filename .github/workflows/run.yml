name: Daily Research

on:
  schedule:
    - cron: '6 5 * * *' # 毎日 14:06 JST (UTC 5:06)
  workflow_dispatch: # 手動実行用

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Research Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/run_daily.ts

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/database.sqlite reports/
          git commit -m "Auto: Daily research and report [skip ci]" || echo "No changes to commit"
          git push
